<!DOCTYPE html>

<html>

  <head>
    <meta charset="utf-8">
    <title>IKEAlyzer Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <style>
      body {
        min-height: 100vh;
        background: url("/static/blue_bg.png") no-repeat center;
        background-size: cover;
        overflow-x: hidden;
      }

      .main-content {
        animation: riseIn 1s ease-out, breathe 4s ease-in-out infinite;
      }

      @keyframes riseIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes breathe {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
    </style>
  </head>

  <nav>
    <button onclick="location.href='/'" id="back" class="mb-3 btn btn-outline-light w-100" style="max-width:150px;"> Back </button>
  </nav>

  <body class="text-center d-flex flex-column justify-content-center align-items-center">

    <div class="main-content">

     <h1 class="title text-white mb-4 display-2 fw-bold">IKEAlyzer</h1>

       <h3 class="text-white">
        Register
       </h3>
       <p id="prompt" class="mb-4 text-white"> Create &nbsp an &nbsp Account: </p>

    </div>

      <form method='POST' action="/register" class="w-100" style="max-width:300px;">

        <p class="text-white">
          {{ error|safe }}
          USERNAME:
        </p>
        <input type="text" name="username" class="form-control mb-4" required>
        <p class="text-white"> PASSWORD: </p>
        <input type="password" name="password" class="form-control mb-4" required>
        <p class="text-white"> CONFIRM &nbsp PASSWORD: </p>
        <input type="password" name="confirm" class="form-control mb-3" required>
        <input type="submit" value="Register" id= "sub1" name="sub1" class="btn btn-primary w-100">
      </form>
    </div>
  </body>

  <footer class="text-center fixed-bottom bg-white">
    <span class="h6">Thank you to our generous sponsors:</span>
    <a href="https://palantir.com"><img src="static/logo.jpg" width=100></a>
    <a href="https://x.com"><img src="static/logo2.png" width=25></a>
    <a href="https://blackrock.com"><img src="static/logo3.png" width=100></a>
  </footer>

</html>
