<!DOCTYPE html>

<html>

  <head>
    <meta charset="utf-8">
    <title>IKEAlyzer Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <nav>
    <a href='/' class="back">&#8592; </a>
  </nav>

  <body>
    <div class="main">
      <form method='POST' action="/register">
        <h1> Create &nbsp an &nbsp Account </h1>
        <p>
          {{ error|safe }}
          USERNAME:
        </p>
        <input type="text" name="username" required>
        <br>
        <p> PASSWORD: </p>
        <input type="password" name="password" required>
        <br>
        <p> CONFIRM &nbsp PASSWORD: </p>
        <input type="password" name="confirm" required>
        <br><br>
        <input type="submit" value="Register" id= "sub1" name="sub1">
      </form>
    </div>
  </body>

  <footer class="text-center fixed-bottom bg-white">
    <span class="h6">Thank you to our generous sponsors:</span>
    <a href="https://palantir.com"><img src="static/logo.jpg" width=100></a>
    <a href="https://x.com"><img src="static/logo2.png" width=25></a>
    <a href="https://blackrock.com"><img src="static/logo3.png" width=100></a>
  </footer>

</html>
