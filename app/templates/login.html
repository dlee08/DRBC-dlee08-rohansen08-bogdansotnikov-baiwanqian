<!DOCTYPE html>

<html>

  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  </head>

  <body>
      <h1>
        Login
      </h1>

          <p id="prompt"> Please &nbsp enter &nbsp your &nbsp username &nbsp and &nbsp password &nbsp below: </p>

          <form method='POST' action="/login">
            <p>
              {{ error | safe }}
              USERNAME:
            </p>
            <input type="text" name="username" required>
            <br>
            <p> PASSWORD: </p>
            <input type="password" name="password" required>
            <br><br>
            <input type="submit" name="sub1" class="sub1" value="Submit">
          </form>

          <br>

          <button onclick="location.href='/register'" id="register">Register</button>
  </body>

  <footer class="text-center fixed-bottom bg-white">
    <span>Thank you to our generous sponsors:</span>
    <img src="static/logo.jpg" width=150>
    <img src="static/logo2.png" width=50>
    <img src="static/logo3.png" width=100>
  </footer>

</html>
