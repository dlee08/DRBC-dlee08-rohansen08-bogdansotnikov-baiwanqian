<!DOCTYPE html>

<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IKEAlyzer Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
      body {
        min-height: 100vh;
        background: url("/static/blue_bg.png") no-repeat center;
        background-size: cover;
        overflow: hidden;
      }

      .main-content {
        animation: riseIn 1s ease-out, breathe 4s ease-in-out infinite;
      }

      @keyframes riseIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes breathe {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
    </style>
  </head>

  <body class="text-center d-flex flex-column justify-content-center align-items-center">

    <div class="main-content">

      <h1 class="title text-white mb-4 display-2 fw-bold">IKEAlyzer</h1>

      <h3 class="text-white">
        Login
      </h3>

      <p id="prompt" class="mb-3 text-white"> Please &nbsp enter &nbsp your &nbsp username &nbsp and &nbsp password &nbsp below: </p>

    </div>

    <form method='POST' action="/login" class="w-100" style="max-width:300px;">
      <p class="text-white">
        {{ error | safe }}
        USERNAME:
      </p>
      <input type="text" name="username" class="form-control mb-2" required>
      <br>
      <p class="text-white"> PASSWORD: </p>
      <input type="password" name="password" class="form-control mb-2" required>
      <br><br>
      <input type="submit" name="sub1" class="btn btn-primary w-100" value="Submit">
    </form>

    <br>

    <button onclick="location.href='/register'" id="register" class="btn btn-outline-light w-100" style="max-width:300px;"> Register </button>
  </body>

  <footer class="text-center fixed-bottom bg-white">
      <span class="h6">Thank you to our generous sponsors:</span>
      <img src="static/logo.jpg" width=100>
      <img src="static/logo2.png" width=25>
      <img src="static/logo3.png" width=100>
    </footer>

</html>
