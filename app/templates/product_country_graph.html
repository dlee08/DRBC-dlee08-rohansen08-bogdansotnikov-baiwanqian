<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Metrics by Country</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-primary-subtle">
    <div class="container py-4">
      <a href="/" class="btn btn-outline-secondary btn-sm mb-3">Back to Home</a>
      <h1 class="mb-2">Product Metrics by Country</h1>
      <p class="mb-4"><strong>Product:</strong> {{ product_label }}</p>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h4 mb-3">Price by Country</h2>
          <div class="row g-3 align-items-end mb-4">
            <div class="col-md-4">
              <label for="currency-select" class="form-label">Currency</label>
              <select id="currency-select" class="form-select">
                {% for currency in currencies %}
                <option value="{{ currency }}" {% if currency == default_currency %}selected{% endif %}>{{ currency }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label for="price-order-select" class="form-label">Order</label>
              <select id="price-order-select" class="form-select">
                <option value="alphabetical">Alphabetical</option>
                <option value="ascending">Price, ascending</option>
                <option value="descending" selected>Price, descending</option>
              </select>
            </div>
          </div>
          <div id="price-chart"></div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h4 mb-3">Rating by Country</h2>
          <div class="row g-3 align-items-end mb-4">
            <div class="col-md-4">
              <label for="rating-order-select" class="form-label">Order</label>
              <select id="rating-order-select" class="form-select">
                <option value="alphabetical">Alphabetical</option>
                <option value="ascending">Rating, ascending</option>
                <option value="descending" selected>Rating, descending</option>
              </select>
            </div>
          </div>
          <div id="rating-chart"></div>
        </div>
      </div>
    </div>

    <script>
      const productGroupId = {{ product_group_id|tojson }};
      let selectedCurrency = {{ default_currency|tojson }};
      let priceChartData = {{ price_chart_data|tojson }};
      let ratingChartData = {{ rating_chart_data|tojson }};

      function createBarChart({ containerId, metricKey, metricLabel, fill, yTickFormatter, defaultMax = null }) {
        const width = 1100;
        const height = 560;
        const marginTop = 30;
        const marginRight = 20;
        const marginBottom = 140;
        const marginLeft = 80;

        const svg = d3.create("svg")
          .attr("viewBox", [0, 0, width, height])
          .attr("style", `max-width: ${width}px; height: auto; font: 12px sans-serif; overflow: visible;`);

        const x = d3.scaleBand()
          .range([marginLeft, width - marginRight])
          .padding(0.18);

        const y = d3.scaleLinear()
          .range([height - marginBottom, marginTop]);

        const barsLayer = svg.append("g");
        const gx = svg.append("g")
          .attr("transform", `translate(0,${height - marginBottom})`);
        const gy = svg.append("g")
          .attr("transform", `translate(${marginLeft},0)`);

        const comparators = {
          alphabetical: (a, b) => d3.ascending(a.country, b.country),
          ascending: (a, b) => d3.ascending(a[metricKey], b[metricKey]),
          descending: (a, b) => d3.descending(a[metricKey], b[metricKey])
        };

        function render(rows, orderKey) {
          const sortedRows = [...rows].sort(comparators[orderKey]);
          x.domain(sortedRows.map((row) => row.country));
          const maxValue = d3.max(sortedRows, (row) => row[metricKey]) || 1;
          y.domain([0, defaultMax == null ? maxValue : Math.max(defaultMax, maxValue)]).nice();

          const t = svg.transition().duration(700);

          const barSelection = barsLayer.selectAll("rect")
            .data(sortedRows, (d) => d.country)
            .join("rect")
            .attr("fill", fill)
            .attr("y", (d) => y(d[metricKey]))
            .attr("height", (d) => y(0) - y(d[metricKey]))
            .attr("width", x.bandwidth());

          barSelection
            .order()
            .transition(t)
            .delay((_, i) => i * 22)
            .attr("x", (d) => x(d.country))
            .attr("y", (d) => y(d[metricKey]))
            .attr("height", (d) => y(0) - y(d[metricKey]));

          gx.transition(t)
            .call(d3.axisBottom(x).tickSizeOuter(0))
            .call((g) => g.selectAll("text")
              .attr("transform", "rotate(-35)")
              .style("text-anchor", "end"));

          gy.transition(t)
            .call(d3.axisLeft(y).tickFormat(yTickFormatter))
            .call((g) => g.select(".domain").remove());
        }

        document.getElementById(containerId).appendChild(svg.node());
        return { render };
      }

      const priceChart = createBarChart({
        containerId: "price-chart",
        metricKey: "price",
        metricLabel: "Price",
        fill: "#0d6efd",
        yTickFormatter: (value) => `${value.toLocaleString(undefined, { maximumFractionDigits: 0 })} ${selectedCurrency}`
      });

      const ratingChart = createBarChart({
        containerId: "rating-chart",
        metricKey: "rating",
        metricLabel: "Rating",
        fill: "#fd7e14",
        defaultMax: 5,
        yTickFormatter: (value) => value.toLocaleString(undefined, { maximumFractionDigits: 1 })
      });

      async function loadPriceChartData() {
        const response = await fetch(
          `/api/product_graph_data/${encodeURIComponent(productGroupId)}?target_currency=${encodeURIComponent(selectedCurrency)}`
        );
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Unable to load product price data.");
        }
        priceChartData = payload.data;
        selectedCurrency = payload.target_currency;
        priceChart.render(priceChartData, document.getElementById("price-order-select").value);
      }

      document.getElementById("currency-select").addEventListener("input", (event) => {
        selectedCurrency = event.target.value;
        loadPriceChartData();
      });

      document.getElementById("price-order-select").addEventListener("input", (event) => {
        priceChart.render(priceChartData, event.target.value);
      });

      document.getElementById("rating-order-select").addEventListener("input", (event) => {
        ratingChart.render(ratingChartData, event.target.value);
      });

      priceChart.render(priceChartData, document.getElementById("price-order-select").value);
      ratingChart.render(ratingChartData, document.getElementById("rating-order-select").value);
    </script>
  </body>
</html>
