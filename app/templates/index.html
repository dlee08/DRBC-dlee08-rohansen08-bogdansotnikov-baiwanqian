<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IKEAlyzer</title>
  </head>
  <body class="bg-primary-subtle">
    <div class="container py-5">
      <div class="d-flex justify-content-end gap-2 mb-3">
        <a href="/profile" class="btn btn-outline-primary">Profile</a>
        <a href="/logout" class="btn btn-outline-danger">Logout</a>
      </div>
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h1 class="mb-3">Welcome to IKEAlyzer</h1>
          <p class="lead">Find the best deals on IKEA products worldwide.</p>

          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 class="h4 mb-3">Browse the Catalog</h2>
              <a href="/catalog" class="btn btn-primary">Go to Catalog</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="text-center fixed-bottom">
      <p>Sponsored by Palantir, Tesla, and the Department of Government Efficiency</p>
    </footer>
  </body>
</html>
