<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IKEA Demo Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <div>
      <label for="country-select">Country</label>
      <select id="country-select">
        {% for country in countries %}
        <option value="{{ country }}" {% if country == default_country %}selected{% endif %}>{{ country }}</option>
        {% endfor %}
      </select>

      <label for="order-select">Order</label>
      <select id="order-select">
        <option value="alphabetical">Alphabetical</option>
        <option value="ascending">Price, ascending</option>
        <option value="descending" selected>Price, descending</option>
      </select>
    </div>
    <div id="chart"></div>

    <script>
      const initialCountry = {{ default_country|tojson }};
      let data = [];

      const width = 960;
      const height = 500;
      const marginTop = 20;
      const marginRight = 0;
      const marginBottom = 120;
      const marginLeft = 60;

      const x = d3.scaleBand()
        .domain([])
        .range([marginLeft, width - marginRight])
        .padding(0.1);

      const y = d3.scaleLinear()
        .domain([0, 1])
        .range([height - marginBottom, marginTop]);

      const xAxis = d3.axisBottom(x).tickSizeOuter(0);
      const yAxis = d3.axisLeft(y).tickFormat((value) => `$${value.toLocaleString()}`);

      const svg = d3.create("svg")
        .attr("viewBox", [0, 0, width, height])
        .attr("style", `max-width: ${width}px; height: auto; font: 10px sans-serif; overflow: visible;`);

      const bars = svg.append("g")
        .attr("fill", "steelblue")
        .selectAll("rect")
        .data([], (d) => d.product_type)
        .join("rect");

      const gx = svg.append("g")
        .attr("transform", `translate(0,${height - marginBottom})`)
        .call(xAxis)
        .call((g) => g.selectAll("text")
          .attr("transform", "rotate(-35)")
          .style("text-anchor", "end"));

      const gy = svg.append("g")
        .attr("transform", `translate(${marginLeft},0)`)
        .call(yAxis)
        .call((g) => g.select(".domain").remove());

      const comparators = {
        alphabetical: (a, b) => d3.ascending(a.product_type, b.product_type),
        ascending: (a, b) => d3.ascending(a.price, b.price),
        descending: (a, b) => d3.descending(a.price, b.price)
      };

      function update(orderKey) {
        const sortedData = [...data].sort(comparators[orderKey]);
        x.domain(sortedData.map((d) => d.product_type));
        y.domain([0, d3.max(sortedData, (d) => d.price) || 1]).nice();

        const t = svg.transition().duration(800);

        const barSelection = svg.select("g")
          .selectAll("rect")
          .data(sortedData, (d) => d.product_type)
          .join("rect")
          .style("mix-blend-mode", "multiply")
          .attr("y", (d) => y(d.price))
          .attr("height", (d) => y(0) - y(d.price))
          .attr("width", x.bandwidth());

        barSelection
          .order()
          .transition(t)
          .delay((_, i) => i * 22)
          .attr("x", (d) => x(d.product_type))
          .attr("y", (d) => y(d.price))
          .attr("height", (d) => y(0) - y(d.price))
          .attr("width", x.bandwidth());

        gx.transition(t)
          .call(xAxis)
          .call((g) => g.selectAll("text")
            .attr("transform", "rotate(-35)")
            .style("text-anchor", "end"));

        gy.transition(t)
          .call(yAxis)
          .call((g) => g.select(".domain").remove());
      }

      async function loadCountry(country) {
        const response = await fetch(`/api/demo_graph_data?country=${encodeURIComponent(country)}`);
        const payload = await response.json();
        data = payload.data;
        update(document.getElementById("order-select").value);
      }

      document.getElementById("order-select").addEventListener("input", (event) => {
        update(event.target.value);
      });

      document.getElementById("country-select").addEventListener("input", (event) => {
        loadCountry(event.target.value);
      });

      document.getElementById("chart").appendChild(svg.node());
      loadCountry(initialCountry);
    </script>
  </body>
</html>
